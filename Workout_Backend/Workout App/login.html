<!DOCTYPE html>
<html>
<head>
  <title>Workout App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body class="centered-page">
  <div class="card">
    <div class="lang-picker">
      <button onclick="setLang('en')" title="English">🇬🇧</button>
      <button onclick="setLang('fr')" title="French">🇫🇷</button>
      <button onclick="setLang('de')" title="German">🇩🇪</button>
      <button onclick="setLang('ru')" title="Russian">🇷🇺</button>
      <button onclick="setLang('he')" title="Hebrew">🇮🇱</button>
    </div>

    <h2 data-i18n="💪 Workout Tracker">💪 Workout Tracker</h2>
    <p class="subtitle" data-i18n="Select your profile to continue">Select your profile to continue</p>

    <select id="username" class="input">
      <option value="" data-i18n="Choose user...">Choose user...</option>
      <option value="Alon">Alon</option>
      <option value="Ethan">Ethan</option>
      <option value="George">George</option>
      <option value="Hubert">Hubert</option>
      <option value="Igor">Igor</option>
      <option value="Jacob">Jacob</option>
      <option value="Liron">Liron</option>
      <option value="Matvei">Matvei</option>
      <option value="Nicole :)">Nicole</option>
      <option value="Sebastian">Sebastian</option>
    </select>

    <button onclick="login()" class="btn" data-i18n="Let's Go">Let's Go</button>
    <p id="error" class="error"></p>
  </div>

  <script>
    async function login() {
      const username = document.getElementById("username").value;
      const errorEl = document.getElementById("error");

      if (!username) {
        errorEl.textContent = "Please select a user";
        return;
      }

      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
      });

      const data = await res.json();
      if (res.ok) {
        window.location.href = "/index.html";
      } else {
        errorEl.textContent = data.error;
      }
    }

  </script>
  <script src="i18n.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Workout Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>💪 Workout Tracker</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
        <a href="/history.html" class="logout-btn" style="text-decoration:none;">📅 History</a>
        <a href="/cardio.html" class="logout-btn" style="text-decoration:none;">🏃 Cardio</a>
        <a href="/add-exercise.html" class="logout-btn" style="text-decoration:none;">➕ Exercise</a>
        <button class="export-btn" onclick="exportToExcel()">📥</button>
        <button class="bug-btn" onclick="reportBug()">🐛</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="form-card">
      <div class="form-row">
        <input type="date" id="dateInput">
        <select id="daySelect">
          <option value="">Select Day</option>
          <option value="Push">Push</option>
          <option value="Pull">Pull</option>
          <option value="Legs">Legs</option>
          <option value="Core">Core</option>
        </select>
      </div>

      <select id="exerciseSelect">
        <option value="">Select Exercise</option>
      </select>

      <!-- Mini exercise history -->
      <div id="exerciseHistoryWrap" style="display:none;">
        <div class="mini-history-label">📈 Last times you did this</div>
        <div id="exerciseHistoryList" class="mini-history-list"></div>
      </div>

      <div class="form-row">
        <input type="number" id="reps" placeholder="Reps" inputmode="decimal" step="1">
        <input type="number" id="weight" placeholder="Weight (lbs)" inputmode="decimal" step="0.5">
      </div>

      <textarea id="notes" placeholder="Notes (optional)" rows="2"></textarea>

      <button onclick="addWorkout()">+ Add Set</button>
    </div>

    <!-- Today's sets only — no last session panel -->
    <div id="todayWrap">
      <div class="section-label" id="todayLabel">📝 Today's sets</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Exercise</th><th>Reps</th><th>Wt</th><th>Vol</th><th>Notes</th><th></th></tr>
          </thead>
          <tbody id="workoutTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function reportBug() {
      if (confirm("Call Ethan?")) window.location.href = "tel:6479290774";
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>

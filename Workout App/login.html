<!DOCTYPE html>
<html>
<head>
  <title>Workout Tracker - Login</title>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: #1e1e1e;
      padding: 40px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: none;
      background: #4CAF50;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    .hint {
      margin-top: 15px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h1>Workout Login</h1>

    <!-- 🔥 IMPORTANT: method POST, action /login -->
    <form method="POST" action="/login">
      <input 
        type="text" 
        name="username" 
        placeholder="Enter Username"
        required
      />

      <button type="submit">Login</button>
    </form>

    <div class="hint">
      Users: Ethan, Hubert, Liron
    </div>
  </div>

</body>
</html>
